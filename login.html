<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
    background: linear-gradient(to bottom right, aqua, #73b2f5);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    font-family:Arial;
}

form{
    background:aliceblue;
    border:6px outset blue;
    padding:35px;
    width:350px;
    border-radius:8px;
}

h1{
    text-align:center;
}

.form-group{
    display:flex;
    flex-direction:column;
    margin-bottom:18px;
}

label{
    font-weight:bold;
}

input{
    padding:10px;
    border-radius:5px;
    border:1px solid #ccc;
}

.password-box{
    display:flex;
}

.password-box input{
    flex:1;
}

.eye{
    cursor:pointer;
    padding:10px;
    background:#ddd;
}

button{
    background:linear-gradient(to bottom,#007bff,#0056b3);
    color:white;
    padding:12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    width:100%;
}

.links{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
}
</style>
</head>

<body>

<form onsubmit="return validateLogin()">

<h1>Login</h1>

<div class="form-group">
<label>Username</label>
<input type="text" id="username" required>
</div>

<div class="form-group">
<label>Password</label>

<div class="password-box">
<input type="password" id="password" required>
<span class="eye" onclick="togglePassword()">👁</span>
</div>

</div>

<div class="form-group">
<label id="captchaQuestion"></label>
<input type="number" id="captcha" required>
</div>

<button type="submit">Login</button>

<div class="links">
<a href="signup.html">Sign Up</a>
<a href="#">Forgot Password</a>
</div>

</form>

<script>

let a,b,correctAnswer;

function generateCaptcha(){
    a=Math.floor(Math.random()*10)+1;
    b=Math.floor(Math.random()*10)+1;

    correctAnswer=a+b;

    document.getElementById("captchaQuestion").innerText=
    "Captcha: "+a+" + "+b+" = ?";
}

generateCaptcha();

function togglePassword(){

let pass=document.getElementById("password");

if(pass.type==="password")
pass.type="text";
else
pass.type="password";

}

function validateLogin(){

let enteredUser=document.getElementById("username").value;
let enteredPass=document.getElementById("password").value;
let captcha=parseInt(document.getElementById("captcha").value);

let savedUser=localStorage.getItem("username");
let savedPass=localStorage.getItem("password");

if(enteredUser!==savedUser || enteredPass!==savedPass){

alert("Invalid Username or Password ❌");
return false;

}

if(captcha!==correctAnswer){

alert("Wrong Captcha ❌");
generateCaptcha();
return false;

}

alert("Login Successful ✅");

window.location.href="dashboard.html";

return false;

}

</script>

</body>
</html>
